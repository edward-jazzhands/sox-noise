# HOW THIS WORKFLOW WORKS
# This workflow automates building a Debian package and creating a GitHub Release.

# --- Manual Steps ---
# 1. Edit `pyproject.toml` to set the new version (e.g., `version = "1.2.3"` or
#    `version = "1.2.4-rc1"` for pre-releases).
# 2. Commit the change and merge it to the `main` branch (From the feature branch or  
#    however you work).
# 3. On your local machine, fetch and pull the latest changes from `main` to ensure
#    you're up to date.
# 4. Run the release script, then push the tags to GitHub (conditonal on success):

#    `bash .github/scripts/release.sh && git push --tags`

# This command will:
# - Check that you're on the `main` branch and that it's up to date with `origin/main`.
# - Create a new tag based on the version in `pyproject.toml`.
# - Pushes the new tag to github which, triggers this workflow file.

name: Create Release and Package Debian (.deb)

on:
  push:
    tags:
      - "v*" # Runs on any tag starting with "v", e.g., v1.2.3 or v1.2.3-rc1
  workflow_dispatch:
    # This allows us to manually trigger the workflow from the GitHub UI
    inputs:
      tag_name:
        description: 'Tag to create release for (e.g., v1.2.3). Must start with "v".'
        required: true
        type: string

jobs:
  build-and-release:
    name: Build .deb Package and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create and upload assets to the GitHub Release.

    steps:
      # If manually triggered, checkout the specific tag. Otherwise, it checks out the tag that 
      # triggered the workflow.
      # Fetch all history for all tags so the changelog-reader can find previous tags.
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-python \
            python3-all \
            python3-setuptools \
            python3-setuptools-scm \
            tomli

      - name: Verify tag matches pyproject.toml version
        id: version_check
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name }}"
          PYPROJECT_VERSION=$(python3 -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [ "v$PYPROJECT_VERSION" != "$TAG_NAME" ]; then
            echo "Error: Tag '$TAG_NAME' does not match pyproject.toml version 'v$PYPROJECT_VERSION'"
            exit 1
          fi

          echo "Tag and pyproject.toml version match: $TAG_NAME"
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Debian Package
        run: |
          # -b: build binary packages only (produces .deb)
          # -uc: do not sign the .changes file
          # -us: do not sign the source package
          dpkg-buildpackage -b -uc -us
      # This utility allows us to inject the changelog into the GitHub Release notes.
      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          validation_level: warn
          version: ${{ steps.version_check.outputs.version }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag_name || github.ref_name }}
          # The release title will be something like "Release v1.2.3"
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          # The release 'body' is the changelog entry from the previous step
          body: ${{ steps.changelog_reader.outputs.changes }}
          # Automatically mark as pre-release if the tag contains a hyphen (e.g., v1.2.3-rc1):
          prerelease: ${{ contains(github.event.inputs.tag_name || github.ref_name, '-') }}
          # Allows the action to update a release if it already exists:
          allowUpdates: true
          # dpkg-buildpackage places output files in the parent directory (..)
          artifacts: "../*.deb"